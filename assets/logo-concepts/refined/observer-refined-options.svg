    <linearGradient id="softGlass" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#ffffff"/>
      <stop offset=".52" stop-color="#dbf8f4"/>
      <stop offset="1" stop-color="#7ad9ce"/>
    </linearGradient>
    <linearGradient id="darkGlass" x1="0" y1="0" x2="1" y2="1">
