<svg width="2400" height="1800" viewBox="0 0 2400 1800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #f4f6f6; }
      .card { fill: #ffffff; stroke: #dfe6e6; stroke-width: 2; }
      .ink { stroke: #203235; }
      .title { fill: #17282c; font-family: Inter, -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif; font-size: 56px; font-weight: 760; letter-spacing: 0; }
      .subtitle { fill: #617074; font-family: Inter, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif; font-size: 26px; font-weight: 520; letter-spacing: 0; }
      .name { fill: #203235; font-family: Inter, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif; font-size: 34px; font-weight: 760; letter-spacing: 0; }
      .caption { fill: #617074; font-family: Inter, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif; font-size: 21px; font-weight: 520; letter-spacing: 0; }
    </style>
    <linearGradient id="tealBase" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#faffff"/>
      <stop offset="0.55" stop-color="#dff7f3"/>
      <stop offset="1" stop-color="#8ce1d4"/>
    </linearGradient>
    <linearGradient id="warmBase" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#fffefd"/>
      <stop offset="0.52" stop-color="#e9f7f3"/>
      <stop offset="1" stop-color="#ffd27d"/>
